<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한솔제지</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.1/js/swiper.js" integrity="sha256-2AzmZuC/JWSxd9zvzxqNIBQIoB/uSRsSYtXJBhAkfjY=" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.1/css/swiper.css" integrity="sha256-eN7gD6kRzzeXS87cycVGlO3smXA9o+yeN0BDkTVaOc0=" crossorigin="anonymous" />

  <style>
    *{margin:0;border:none;padding:0;box-sizing:border-box;}
    .clearfix::after{content:'';display:block;clear:both;}
    a{text-decoration:none;color:#333;}
    ul,ol,li{list-style:none;}
    h1,h2,h3,h4,h5,h6,p,div,span,ul,ol,li,a,label,option{font-weight:400;font-size:14px;color:#333;vertical-align:baseline;}
    img{vertical-align:bottom;}

    /* 1280이상 pc버전*/
    .wrap{width:93.75%;max-width:1200px;margin:0 auto;}
    .header{border-top:2px solid blue;padding:20px 0;position: relative;}
    .mo_header{display:none;padding:0 10px;}
    .mo_header>li:first-child{float:left;}
    .mo_header>li:last-child{float:right;}
    .mo_logo>div{float:left;}
    .tgl_btn{width:20px;cursor:pointer;}
    .tgl_btn span{display:block;height:2px;margin-bottom:7px;background:#333;}
    .tgl_btn span:last-child{margin-bottom:0;}
    .main_logo{position:absolute;left:10px;top:30px;}
    .main_logo_top>div{float:left;}
    .point{margin-right:8px;}
    .point::before,.point::after{content:'';display:block;width:8px;height:8px;}
    .point::before{background:blue;margin-bottom:8px;}
    .point::after{background:green;}
    h1{margin-top:-14px;font-size:2.6em;font-weight:900;color:#666;}
    .main_logo_bottom{text-align:right;}
    .navigation>nav>ul{float:right;}
    nav>ul>li{float:left;}
    nav:first-child{margin-bottom:20px;}
    nav:first-child>ul>li::before{content:'';display:inline-block;width:1px;height:10px;margin:0 20px;background:#333;}
    nav:first-child>ul>li:first-child::before{display:none;}
    nav>ul>li:last-child{margin-right:10px;}
    nav:last-child li{margin-left:30px;}
    nav:last-child a{font-size:1.5em;font-weight:900;}

    /* Main Banner section */
    .swiper-slide{overflow:hidden;position:relative;height:400px;}
    .swiper-slide img{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
    .banner_txt{position:absolute;left:100px;top:50%;transform:translate(0, -54%);}
    .banner_txt h2,.banner_txt p{color:white;}
    .banner_txt h2{display:inline-block;margin-bottom:10px;border-bottom:2px solid white;font-weight:bolder;font-size:6em;}
    .banner_txt p{font-size:2em;}
    #next_btn{display:none;top:40%;}

    
    /* .swiper-slide img{width:100%;} */
    /* 1279이하 테블릿버전*/
    @media (max-width:1279px){
      
    }

    /* 860이하 */
    @media (max-width:860px){
      .header{padding:5px 0 14px;}
      .main_logo{left:10px;top:14px;}
      .main_logo_bottom{display:none;}
      nav:first-child{display:none;}
      nav:last-child{margin-top:10px;}
      nav:last-child li{margin-left:20px;}
      nav:last-child a{font-size:1.3em;}
    }
    /* 760이하 */
    @media (max-width:760px){
      .header{padding: 16px 0 6px;}
      .pc_header{display:none;}
      .pc_header{width:100%;background:white;position:absolute;left:0;top:57px;}
      .pc_header .main_logo{display:none;}
      nav:first-child{display:block;}
      .sub_nav{width:100%;}
      .sub_nav li{width:25%;border:1px solid #333;padding:10px;background:green;text-align:center;}
      .sub_nav a{font-weight:bold;color:white;}
      nav:first-child>ul>li::before{display:none;}
      nav>ul>li:last-child {margin-right:0;}
      .mo_header{display:block;}

      nav:last-child>ul>li{float:none;}
      .navigation>nav:last-child>.nav{float:none;}

      #next_btn{display:block;}
    }

    /* 640이하 모바일버전 */
    @media (max-width:640px){
      .wrap{width:100%;}

      .banner_txt{left:50px;}
      .banner_txt h2{font-size:4em;}
      .banner_txt p{font-size:1.6em;}

    }

    /* 540이하 */
    @media (max-width:540px){
      .sub_nav li{width:50%;}

    }

  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <ul class="mo_header clearfix">
        <li class="mo_logo clearfix">
          <div class="point"></div>
          <div><h1>Hansol</h1></div>
        </li>
        <li class="tgl_btn" onclick="
        document.querySelector('#menu').style.display='block';
        document.querySelector('.mo_header').style.display='none';
        document.querySelector('.pc_header').style.top='0';
        
        ">
          <span></span>
          <span></span>
          <span></span>
        </li>
      </ul>
      <ul class="pc_header" id="menu">
        <li class="main_logo">
          <ul>
            <li class="main_logo_top clearfix">
              <div class="point"></div>
              <div><h1>Hansol</h1></div>
            </li>
            <li class="main_logo_bottom">
              한솔제지
            </li>
          </ul>
        </li>
        <li class="navigation">
          <nav class="clearfix">
            <ul class="sub_nav clearfix">
              <li><a href="#">홈</a></li>
              <li><a href="#">사이트맵</a></li>
              <li><a href="#">언어</a></li>
              <li><a href="#">개인정보처리방침</a></li>
            </ul>
          </nav>
          <nav class="clearfix">
            <ul class="nav clearfix">
              <li><a href="#">회사소개</a></li>
              <li><a href="#">사업영역</a></li>
              <li><a href="#">지속가능경영</a></li>
              <li><a href="#">투자정보</a></li>
              <li><a href="#">고객지원</a></li>
            </ul>
          </nav>
        </li>
      </ul>
    </header>
    <section class="main_banner" onclick="
      document.querySelector('#menu').style.display='none';
      document.querySelector('.mo_header').style.display='block';
      document.querySelector('.pc_header').style.top='57px';
    ">
      <!-- Swiper -->
      <div class="swiper-container">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="images/banner01.jpg" alt="banner01">
            <div class="banner_txt">
              <h2>VISION</h2>
              <p>고객에게 더나은 가치를 제공하는<br>글로벌 종이재조 기업</p>
            </div>
          </div>
          <div class="swiper-slide">
            <img src="images/banner02.jpg" alt="banner03">
            <div class="banner_txt">
              <h2>NATURE</h2>
              <p>한솔제지는 더나은 가치를 제공하는<br>글로벌 종이재조 기업</p>
            </div>
          </div>
          <div class="swiper-slide">
            <img src="images/banner03.jpg" alt="banner03">
            <div class="banner_txt">
              <h2>PAPER</h2>
              <p>인쇄용지 더나은 가치를 제공하는<br>글로벌 종이재조 기업</p>
            </div>
          </div>
        </div>
       
        <!-- If we need navigation buttons -->
        <div id="next_btn" class="swiper-button-next"></div>
      </div>

    </section>
    <!-- <section class="quick_nav"></section> -->
    <!-- <section class="papers"></section> -->
    <!-- <section class="notice"></section> -->
    <!-- <footer class="footer"></footer> -->
  </div>
  <!-- Initialize Swiper -->
  <script>
    var swiper = new Swiper('.swiper-container', {
      navigation: {
        nextEl: '.swiper-button-next',
      },
    });
  </script> 
</body>
</html>
